name: ci-cd

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_NAME: jenkins-day1
  HARBOR_REGISTRY: amdp-registry.skala-ai.com
  HARBOR_PROJECT: skala26a-ai2
  AWS_REGION: ap-northeast-2
  EKS_CLUSTER_NAME: skala-2025
  K8S_NAMESPACE: class-2

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set image tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "IMAGE_TAG=${GITHUB_RUN_NUMBER}-${SHORT_SHA}" >> $GITHUB_ENV
          echo "FULL_IMAGE=${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${APP_NAME}:${GITHUB_RUN_NUMBER}-${SHORT_SHA}" >> $GITHUB_ENV

      - name: Check required files
        run: |
          test -f Dockerfile
          test -f index.html
          test -f deploy/deployment.yaml
          test -f deploy/service.yaml
          echo "Required files exist"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push image to Harbor
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ env.FULL_IMAGE }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME
          kubectl config current-context

      - name: Render Kubernetes manifest
        run: |
          sed "s|__IMAGE__|${FULL_IMAGE}|g" deploy/deployment.yaml > deploy/deployment-rendered.yaml
          cat deploy/deployment-rendered.yaml

      - name: Deploy to EKS
        run: |
          kubectl apply -n $K8S_NAMESPACE -f deploy/deployment-rendered.yaml
          kubectl apply -n $K8S_NAMESPACE -f deploy/service.yaml
          kubectl rollout status deployment/$APP_NAME -n $K8S_NAMESPACE --timeout=300s
          kubectl get pods -n $K8S_NAMESPACE
